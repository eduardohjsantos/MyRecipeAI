<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Item</title>
</head>
<body>
    <h1>Add new ingredient</h1>
    <div class="form-container">
        <div th:if="${message}" class="message" th:text="${message}"></div>
        <form th:action ="@{/item/ui/save}" th:object="${item}" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" th:field="*{name}" required />

            <label>Category:</label>
            <select th:field="*{category}">
                <option value="">Select a category</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat}"
                        th:text="${cat}">
                </option>
            </select>

            <label for="amount">Amount:</label>
            <input type="number" id="amount" th:field="*{amount}" required />

            <label for="expiration">Expiration:</label>
            <input type="date" id="expiration" th:field="*{expiration}" required />

            <button type="submit">Add Ingredient</button>
        </form>
        <a th:href="@{/item/ui/list}">Return to ingredients list</a>
    </div>
</body>
</html>
